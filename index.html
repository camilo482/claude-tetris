<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">THEME</span>
          <label class="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-label">LIGHT</span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" class="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <!-- Game Over panel -->
      <div id="overlay-gameover" class="overlay-box hidden">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="overlay-bests" class="overlay-bests"></p>
        <input type="text" id="player-name" maxlength="12" placeholder="Tu nombre" class="hidden" />
        <div id="highscores-section"></div>
        <div class="overlay-buttons">
          <button id="restart-btn">Reiniciar</button>
          <button id="reset-records-btn" class="hidden">Reset records</button>
        </div>
      </div>

      <!-- Pause menu panel -->
      <div id="overlay-pause" class="overlay-box hidden">
        <p class="pause-title">PAUSA</p>
        <button id="resume-btn" class="menu-btn">Reanudar</button>
        <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
        <button id="controls-btn" class="menu-btn">Ver controles</button>
        <ul id="pause-controls" class="pause-controls-list hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída rápida</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>
        <div class="level-select-row">
          <label for="start-level-select">Nivel inicial</label>
          <select id="start-level-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
